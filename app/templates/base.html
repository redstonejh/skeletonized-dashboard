<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Configurable Dashboard Builder</title>
  <script>
    (() => {
      try {
        const background = localStorage.getItem("dashboard-background") || "frosted-light";
        document.documentElement.dataset.background = background;
      } catch {}
    })();
  </script>
  <link rel="stylesheet" href="/static/style.css?v=dashboard-builder-glass-r21">
</head>
<body>
  <main class="page">
    {% if error %}
      <section class="notice error">{{ error }}</section>
    {% endif %}
    {% block content %}{% endblock %}
  </main>
  <dialog class="confirm-dialog" id="panel-delete-dialog" aria-labelledby="panel-delete-title">
    <div class="confirm-dialog-head">
      <span>Confirm action</span>
      <button type="button" class="confirm-dialog-close" aria-label="Cancel deletion">x</button>
    </div>
    <strong id="panel-delete-title">Delete item?</strong>
    <p id="panel-delete-message">Are you sure you want to delete this item?</p>
    <div class="confirm-dialog-actions">
      <button type="button" class="confirm-dialog-btn confirm-dialog-cancel">Cancel</button>
      <button type="button" class="confirm-dialog-btn confirm-dialog-danger">Delete</button>
    </div>
  </dialog>
  <div class="toast-stack" aria-live="polite" aria-atomic="true"></div>
  <script src="/static/demo-data.js?v=dashboard-builder"></script>
  <script src="/static/demo-layout.js?v=dashboard-builder"></script>
  <script src="/static/data-simulation-runtime.js?v=dashboard-builder"></script>
  <script src="/static/widget-registry.js?v=dashboard-builder"></script>
  <script src="/static/widget-runtime.js?v=dashboard-builder"></script>
  <script src="/static/interaction-state.js?v=dashboard-builder"></script>
  <script src="/static/menu-overlay.js?v=dashboard-builder"></script>
  <script src="/static/layout-persistence.js?v=dashboard-builder"></script>
  <script src="/static/drag-runtime.js?v=dashboard-builder"></script>
  <script src="/static/resize-runtime.js?v=dashboard-builder"></script>
  <script src="/static/dashboard-geometry.js?v=dashboard-builder"></script>
  <script src="/static/panel-runtime.js?v=dashboard-builder"></script>
  <script src="/static/panel-containment.js?v=dashboard-builder"></script>
  <script src="/static/collision-reflow.js?v=dashboard-builder"></script>
  <script src="/static/app.js?v=dashboard-builder"></script>
  <script src="/static/liquid-glass-webgl.js?v=dashboard-builder"></script>
  <script src="/static/ai-workspace-operator.js?v=dashboard-builder"></script>
</body>
</html>
